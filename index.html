<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bin2Dec</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <div class="center">
            <div class="box">
                <h1>Bin2Dec</h1>
                <h2>Conversor de Binário para Decimal</h2>
                <div class="entrada">
                    <p>Binário</p>
                    <input id="binario" type="text" placeholder="Entre com um número binário" maxlength="8" onkeypress='return event.charCode >= 48 && event.charCode <= 49'> 
                </div>

                <div class="entrada">
                    <p>Decimal</p>
                    <input id="decimal" type="text" disabled> 
                </div>

                <div class="btn">
                    <button onclick="binToDec()">Converter</button>
                </div>
                
                
            </div>
        </div>
        


        <script src="js/script.js"></script>
    </body>
</html>
